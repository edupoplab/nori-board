<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>새싹 놀이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #EAF4FE;
    --navy: #1E3A5F;
    --sun: #FFC93C;
    --coral: #FF7B6B;
    --mint: #6ED3BF;
    --white: #FFFFFF;
    --shadow: 0 6px 0 rgba(30, 58, 95, 0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Gowun Dodum', sans-serif;
    background: var(--sky);
    color: var(--navy);
    overflow-x: hidden;
    -webkit-user-select: none; user-select: none;
  }

  /* ───── 헤더 ───── */
  header {
    padding: 28px 32px 8px;
    display: flex; align-items: center; gap: 14px;
  }
  .logo-dot {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--sun); position: relative; flex-shrink: 0;
  }
  .logo-dot::after {
    content: ''; position: absolute; left: 50%; top: -8px;
    width: 10px; height: 16px; border-radius: 8px;
    background: var(--mint); transform: translateX(-50%) rotate(12deg);
  }
  h1 { font-family: 'Jua', sans-serif; font-size: 34px; font-weight: 400; letter-spacing: 1px; }
  .header-sub { font-size: 15px; opacity: 0.6; margin-top: 3px; }

  /* ───── 놀이 카드 그리드 ───── */
  main { padding: 20px 32px 90px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 26px;
  }
  .card {
    background: var(--white);
    border-radius: 22px;
    box-shadow: var(--shadow);
    overflow: hidden;
    cursor: pointer;
    border: none; text-align: left; padding: 0;
    font-family: inherit; color: inherit;
    transition: transform 0.15s ease;
  }
  .card:nth-child(odd)  { transform: rotate(-1deg); }
  .card:nth-child(even) { transform: rotate(1deg); }
  .card:active { transform: scale(0.96); }
  .card:focus-visible { outline: 4px solid var(--sun); outline-offset: 3px; }
  .thumb {
    width: 100%; aspect-ratio: 4 / 3; object-fit: cover; display: block;
    background: var(--sky);
  }
  .thumb-ph {
    width: 100%; aspect-ratio: 4 / 3;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Jua', sans-serif; font-size: 72px; color: var(--white);
  }
  .card-body { padding: 14px 16px 16px; }
  .card-title {
    font-family: 'Jua', sans-serif; font-size: 20px; font-weight: 400;
    line-height: 1.3; word-break: keep-all;
  }
  .badges { display: flex; gap: 6px; margin-top: 9px; }
  .badge {
    font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    color: var(--navy);
  }
  .badge.a3 { background: var(--mint); }
  .badge.a4 { background: var(--sun); }
  .badge.a5 { background: var(--coral); color: var(--white); }

  /* ───── 상태 화면 ───── */
  .state {
    text-align: center; padding: 90px 20px; font-family: 'Jua', sans-serif;
    font-size: 24px; opacity: 0.55;
  }

  /* ───── 교사 모드 버튼 ───── */
  #teacherBtn {
    position: fixed; right: 16px; bottom: 14px;
    font-family: 'Gowun Dodum', sans-serif; font-size: 13px;
    background: rgba(30, 58, 95, 0.08); color: var(--navy);
    border: none; border-radius: 999px; padding: 8px 16px;
    cursor: pointer; opacity: 0.65;
  }

  /* ───── 모달 공통 ───── */
  .modal {
    position: fixed; inset: 0; background: rgba(30, 58, 95, 0.45);
    display: none; align-items: center; justify-content: center; z-index: 50;
    padding: 20px;
  }
  .modal.open { display: flex; }
  .sheet {
    background: var(--white); border-radius: 26px; padding: 30px;
    width: 100%; max-width: 440px; box-shadow: var(--shadow);
    max-height: 85vh; overflow-y: auto;
  }
  .sheet h2 { font-family: 'Jua', sans-serif; font-weight: 400; font-size: 24px; margin-bottom: 18px; }
  .sheet label { display: block; font-size: 14px; margin: 16px 0 8px; opacity: 0.75; }
  .pw-input {
    width: 100%; font-size: 22px; padding: 12px 16px;
    border: 2px solid var(--sky); border-radius: 14px;
    font-family: inherit; color: var(--navy); letter-spacing: 4px;
  }
  .pw-input:focus { outline: none; border-color: var(--sun); }
  .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip {
    font-family: 'Jua', sans-serif; font-size: 17px; font-weight: 400;
    padding: 10px 20px; border-radius: 999px; cursor: pointer;
    border: 2px solid var(--sky); background: var(--white); color: var(--navy);
  }
  .chip.on { background: var(--navy); border-color: var(--navy); color: var(--white); }
  .btn-row { display: flex; gap: 10px; margin-top: 26px; }
  .btn {
    flex: 1; font-family: 'Jua', sans-serif; font-size: 18px; font-weight: 400;
    padding: 14px; border-radius: 16px; border: none; cursor: pointer;
  }
  .btn-primary { background: var(--sun); color: var(--navy); box-shadow: 0 4px 0 rgba(30,58,95,0.15); }
  .btn-primary:active { transform: translateY(2px); box-shadow: none; }
  .btn-ghost { background: var(--sky); color: var(--navy); }
  .err { color: var(--coral); font-size: 14px; margin-top: 10px; display: none; }
  .admin-link {
    display: block; text-align: center; margin-top: 18px; font-size: 14px;
    color: var(--navy); opacity: 0.6;
  }

  /* ───── 놀이 플레이어 (전체화면) ───── */
  #player {
    position: fixed; inset: 0; background: var(--navy); z-index: 100;
    display: none;
  }
  #player.open { display: block; }
  #playerFrame { width: 100%; height: 100%; border: none; background: var(--white); }
  #closeBtn {
    position: absolute; top: 12px; right: 12px; z-index: 110;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--coral); color: var(--white); border: 3px solid var(--white);
    font-size: 26px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
  }

  @media (prefers-reduced-motion: reduce) {
    .card, .card:nth-child(odd), .card:nth-child(even) { transform: none; transition: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot" aria-hidden="true"></div>
  <div>
    <h1 id="siteTitle">새싹 놀이터</h1>
    <div class="header-sub" id="headerSub">하고 싶은 놀이를 눌러 보세요!</div>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="state" id="stateMsg">놀이를 불러오고 있어요…</div>
</main>

<button id="teacherBtn">교사 모드</button>

<!-- 교사 비밀번호 -->
<div class="modal" id="pwModal">
  <div class="sheet">
    <h2>교사 모드</h2>
    <label for="pwInput">비밀번호를 입력해 주세요</label>
    <input class="pw-input" id="pwInput" type="password" inputmode="numeric" autocomplete="off">
    <div class="err" id="pwErr">비밀번호가 맞지 않아요.</div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="pwCancel">닫기</button>
      <button class="btn btn-primary" id="pwOk">확인</button>
    </div>
  </div>
</div>

<!-- 교사 설정 -->
<div class="modal" id="setModal">
  <div class="sheet">
    <h2>이 태블릿에 보여줄 놀이</h2>
    <label>연령</label>
    <div class="chip-row" id="ageChips"></div>
    <label>놀이 주제 <span style="opacity:.55">(아무것도 안 고르면 전체)</span></label>
    <div class="chip-row" id="tagChips"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="setCancel">취소</button>
      <button class="btn btn-primary" id="setSave">저장하고 닫기</button>
    </div>
    <a class="admin-link" id="adminLink" href="#" target="_blank" rel="noopener">놀이 링크 등록·관리 페이지 열기 →</a>
  </div>
</div>

<!-- 놀이 플레이어 -->
<div id="player">
  <button id="closeBtn" aria-label="놀이 닫기">✕</button>
  <iframe id="playerFrame" title="놀이 화면" allow="autoplay; camera; microphone; fullscreen"></iframe>
</div>

<script>
/* ══════════════ 설정 (배포 시 여기만 수정) ══════════════ */
const API_URL   = 'https://script.google.com/macros/s/AKfycbzasSuCH2Z3lZU2J_j2ryx26yDuIRAhxPivsQJ7xqNM6TowFuvJXn_nemSdIFIuYjzumg/exec';
const ADMIN_URL = 'admin.html';
const SITE_TITLE = '새싹 놀이터';
/* ═══════════════════════════════════════════════════════ */

const AGES = ['3', '4', '5'];
const PALETTE = ['#6ED3BF', '#FFC93C', '#FF7B6B', '#8FB8F6', '#C9A0F0'];
const SETTINGS_KEY = 'noriSettings';

let allLinks = [];
let settings = loadSettings();
let sessionPw = '';

document.getElementById('siteTitle').textContent = SITE_TITLE;
document.title = SITE_TITLE;
document.getElementById('adminLink').href = ADMIN_URL;

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (s && Array.isArray(s.ages)) return s;
  } catch (e) {}
  return { ages: [...AGES], tags: [] };
}

/* ───── 데이터 불러오기 ───── */
async function fetchLinks() {
  const stateMsg = document.getElementById('stateMsg');
  try {
    const res = await fetch(API_URL + '?action=list');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    allLinks = data.links;
    render();
  } catch (e) {
    stateMsg.textContent = '놀이를 불러오지 못했어요. 선생님을 불러주세요!';
    console.error(e);
  }
}

/* ───── 그리드 렌더 ───── */
function render() {
  const grid = document.getElementById('grid');
  const stateMsg = document.getElementById('stateMsg');
  grid.innerHTML = '';

  const shown = allLinks.filter(l => {
    const ageOk = l.ages.some(a => settings.ages.includes(a));
    const tagOk = settings.tags.length === 0 || l.tags.some(t => settings.tags.includes(t));
    return ageOk && tagOk;
  });

  if (shown.length === 0) {
    stateMsg.textContent = allLinks.length === 0
      ? '아직 등록된 놀이가 없어요.'
      : '선생님이 고른 놀이가 없어요. 교사 모드에서 골라 주세요!';
    stateMsg.style.display = 'block';
    return;
  }
  stateMsg.style.display = 'none';

  shown.forEach((l, i) => {
    const card = document.createElement('button');
    card.className = 'card';
    const thumb = l.thumb
      ? `<img class="thumb" src="${escapeHtml(l.thumb)}" alt="" loading="lazy">`
      : `<div class="thumb-ph" style="background:${PALETTE[i % PALETTE.length]}">${escapeHtml(l.title.charAt(0))}</div>`;
    const badges = l.ages.map(a => `<span class="badge a${a}">${a}세</span>`).join('');
    card.innerHTML = `${thumb}<div class="card-body"><div class="card-title">${escapeHtml(l.title)}</div><div class="badges">${badges}</div></div>`;
    card.addEventListener('click', () => openPlay(l));
    grid.appendChild(card);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ───── 놀이 열기 / 닫기 ───── */
function openPlay(link) {
  if (link.openMode === 'newtab') {
    window.open(link.url, '_blank', 'noopener');
    return;
  }
  const player = document.getElementById('player');
  document.getElementById('playerFrame').src = link.url;
  player.classList.add('open');
  try { document.documentElement.requestFullscreen && document.documentElement.requestFullscreen(); } catch (e) {}
}

document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('player').classList.remove('open');
  document.getElementById('playerFrame').src = 'about:blank';
  try { document.exitFullscreen && document.fullscreenElement && document.exitFullscreen(); } catch (e) {}
});

/* ───── 교사 모드 ───── */
const pwModal = document.getElementById('pwModal');
const setModal = document.getElementById('setModal');

document.getElementById('teacherBtn').addEventListener('click', () => {
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').style.display = 'none';
  pwModal.classList.add('open');
  document.getElementById('pwInput').focus();
});
document.getElementById('pwCancel').addEventListener('click', () => pwModal.classList.remove('open'));
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryAuth(); });
document.getElementById('pwOk').addEventListener('click', tryAuth);

async function tryAuth() {
  const pw = document.getElementById('pwInput').value;
  const btn = document.getElementById('pwOk');
  btn.disabled = true; btn.textContent = '확인 중…';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'auth', pw })
    });
    const data = await res.json();
    if (data.ok) {
      sessionPw = pw;
      pwModal.classList.remove('open');
      openSettings();
    } else {
      document.getElementById('pwErr').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('pwErr').textContent = '연결에 문제가 있어요. 인터넷을 확인해 주세요.';
    document.getElementById('pwErr').style.display = 'block';
  }
  btn.disabled = false; btn.textContent = '확인';
}

function openSettings() {
  const ageBox = document.getElementById('ageChips');
  const tagBox = document.getElementById('tagChips');
  ageBox.innerHTML = ''; tagBox.innerHTML = '';

  AGES.forEach(a => ageBox.appendChild(makeChip(a + '세', settings.ages.includes(a), 'age', a)));

  const allTags = [...new Set(allLinks.flatMap(l => l.tags))];
  if (allTags.length === 0) tagBox.innerHTML = '<span style="opacity:.5;font-size:14px">등록된 주제가 아직 없어요</span>';
  allTags.forEach(t => tagBox.appendChild(makeChip(t, settings.tags.includes(t), 'tag', t)));

  setModal.classList.add('open');
}

function makeChip(label, on, kind, value) {
  const c = document.createElement('button');
  c.className = 'chip' + (on ? ' on' : '');
  c.textContent = label;
  c.dataset.kind = kind; c.dataset.value = value;
  c.addEventListener('click', () => c.classList.toggle('on'));
  return c;
}

document.getElementById('setCancel').addEventListener('click', () => setModal.classList.remove('open'));
document.getElementById('setSave').addEventListener('click', () => {
  const chips = [...setModal.querySelectorAll('.chip.on')];
  const ages = chips.filter(c => c.dataset.kind === 'age').map(c => c.dataset.value);
  const tags = chips.filter(c => c.dataset.kind === 'tag').map(c => c.dataset.value);
  settings = { ages: ages.length ? ages : [...AGES], tags };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  setModal.classList.remove('open');
  render();
});

fetchLinks();
</script>
</body>
</html>
