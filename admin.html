<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새싹나라 놀이터 · 교사 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #EAF4FE; --navy: #1E3A5F; --sun: #FFC93C;
    --coral: #FF7B6B; --mint: #6ED3BF; --white: #fff;
    --line: #DCE8F5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Gowun Dodum', sans-serif; background: #F7FAFE; color: var(--navy); }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 20px 80px; }
  h1 { font-family: 'Jua', sans-serif; font-weight: 400; font-size: 25px; }
  .sub { font-size: 14px; opacity: .6; margin: 4px 0 22px; }
  h2 { font-family: 'Jua', sans-serif; font-weight: 400; font-size: 19px; margin-bottom: 14px; }
  h3 { font-family: 'Jua', sans-serif; font-weight: 400; font-size: 15px; margin: 18px 0 8px; opacity: .85; }

  .cols { display: grid; grid-template-columns: 420px 1fr; gap: 22px; align-items: start; }
  @media (max-width: 980px) { .cols { grid-template-columns: 1fr; } }

  .panel { background: var(--white); border: 1px solid var(--line); border-radius: 18px; padding: 22px; }
  label { display: block; font-size: 13px; opacity: .7; margin: 13px 0 6px; }
  input[type=text], input[type=url], input[type=password], select, textarea {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--navy);
    padding: 10px 13px; border: 1.5px solid var(--line); border-radius: 12px; background: var(--white);
  }
  textarea { resize: vertical; line-height: 1.55; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--sun); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    font-family: inherit; font-size: 13.5px; padding: 7px 13px; border-radius: 999px;
    border: 1.5px solid var(--line); background: var(--white); color: var(--navy); cursor: pointer;
  }
  .chip.on { background: var(--navy); border-color: var(--navy); color: var(--white); }
  .add-inline { display: flex; gap: 8px; margin-top: 8px; }
  .add-inline input { flex: 1; }

  .seg { display: flex; gap: 8px; margin-bottom: 4px; }
  .seg-btn {
    flex: 1; font-family: 'Jua', sans-serif; font-size: 15px;
    padding: 11px; border-radius: 12px; cursor: pointer;
    border: 1.5px solid var(--line); background: var(--white); color: var(--navy);
  }
  .seg-btn.on { background: var(--navy); border-color: var(--navy); color: var(--white); }

  .btn {
    font-family: 'Jua', sans-serif; font-size: 15px; border: none; border-radius: 12px;
    padding: 11px 20px; cursor: pointer;
  }
  .btn-primary { background: var(--sun); color: var(--navy); }
  .btn-ghost { background: var(--sky); color: var(--navy); }
  .btn-danger { background: #FDEDEA; color: #C94F3D; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .mini { font-size: 13px; padding: 7px 12px; border-radius: 10px; }

  .msg { font-size: 14px; margin-top: 12px; display: none; }
  .msg.ok { color: #1F8A70; display: block; }
  .msg.bad { color: var(--coral); display: block; }

  .thumb-preview {
    width: 110px; aspect-ratio: 4/3; border-radius: 10px; object-fit: cover;
    border: 1.5px solid var(--line); display: none; margin-top: 8px;
  }

  /* ── 오른쪽 보드 ── */
  .board-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .board-head select { width: auto; min-width: 150px; }
  .save-sel {
    margin-left: auto; background: var(--mint); color: var(--navy);
  }
  .save-sel.dirty { background: var(--coral); color: var(--white); }
  .filters { border-top: 1px dashed var(--line); margin-top: 12px; padding-top: 4px; }
  .f-row { display: flex; gap: 8px; align-items: baseline; margin: 8px 0; flex-wrap: wrap; }
  .f-label { font-size: 12.5px; opacity: .55; width: 58px; flex-shrink: 0; }

  .item {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 12px 0; border-bottom: 1px solid var(--line);
  }
  .item-desc {
    display: none; width: 100%; font-size: 13px; line-height: 1.65;
    background: var(--sky); border-radius: 10px; padding: 10px 14px;
    margin-top: 2px; white-space: pre-wrap;
  }
  .item.open .item-desc { display: block; }
  .d-arrow { font-size: 11px; opacity: .45; display: inline-block; transition: transform .15s; }
  .item.open .d-arrow { transform: rotate(180deg); }
  .item:last-child { border-bottom: none; }
  .item input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--navy); flex-shrink: 0; cursor: pointer; }
  .item img, .item .ph {
    width: 72px; aspect-ratio: 4/3; border-radius: 10px; object-fit: cover; flex-shrink: 0;
    background: var(--sky);
  }
  .item .ph { display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 24px; color: var(--white); }
  .item-info { flex: 1; min-width: 0; }
  .item-title { font-family: 'Jua', sans-serif; font-size: 15.5px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .cat {
    font-family: 'Gowun Dodum'; font-size: 11px; padding: 2px 8px; border-radius: 999px;
  }
  .cat.play { background: var(--sky); }
  .cat.work { background: #FFF1D6; }
  .item-meta { font-size: 12px; opacity: .6; margin-top: 3px; line-height: 1.5; }
  .empty { opacity: .5; font-size: 14px; padding: 16px 0; }

  #loginView .panel { max-width: 380px; margin: 60px auto; }
  .sticky-note { font-size: 12.5px; opacity: .55; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 로그인 -->
  <div id="loginView">
    <div class="panel">
      <h2>교사 관리 페이지</h2>
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" inputmode="numeric" autocomplete="off">
      <div class="msg" id="loginMsg"></div>
      <div class="btn-row"><button class="btn btn-primary" id="loginBtn" style="flex:1">로그인</button></div>
    </div>
  </div>

  <!-- 관리 화면 -->
  <div id="adminView" style="display:none">
    <h1>새싹나라 놀이터 · 교사 관리</h1>
    <p class="sub">왼쪽에서 등록하고, 오른쪽에서 우리 반 태블릿에 보여줄 놀이를 체크하세요.</p>

    <div class="cols">
      <!-- ════ 왼쪽: 등록 ════ -->
      <div class="panel">
        <h2 id="formTitle">새 링크 등록</h2>

        <div class="seg" id="catSeg">
          <button type="button" class="seg-btn on" data-cat="놀이">🎠 놀이 등록</button>
          <button type="button" class="seg-btn" data-cat="업무">📋 업무 등록</button>
        </div>
        <p class="sticky-note" id="catNote">놀이는 유아 태블릿에 노출되고, 업무는 교사만 볼 수 있어요.</p>

        <label for="fTitle">이름</label>
        <input type="text" id="fTitle" placeholder="예: 한글 단어 미로 게임">

        <label for="fUrl">링크 (URL)</label>
        <input type="url" id="fUrl" placeholder="https://…">

        <div id="playOnly">
          <label>연령</label>
          <div class="chip-row" id="fAges"></div>

          <label>놀이 주제</label>
          <div class="chip-row" id="fThemes"></div>
          <div class="add-inline">
            <input type="text" id="newTheme" placeholder="새 주제 추가">
            <button type="button" class="btn btn-ghost mini" data-add="themes" data-input="newTheme">추가</button>
          </div>

          <label>활동 유형</label>
          <div class="chip-row" id="fTypes"></div>
          <div class="add-inline">
            <input type="text" id="newType" placeholder="새 유형 추가">
            <button type="button" class="btn btn-ghost mini" data-add="types" data-input="newType">추가</button>
          </div>
        </div>

        <div class="row2">
          <div>
            <label for="fTeacher">등록 선생님</label>
            <select id="fTeacher"><option value="">이름 선택</option></select>
            <div class="add-inline">
              <input type="text" id="newTeacher" placeholder="명단에 추가">
              <button type="button" class="btn btn-ghost mini" data-add="teachers" data-input="newTeacher">추가</button>
            </div>
          </div>
          <div>
            <label for="fSource">출처</label>
            <select id="fSource">
              <option value="자체개발">⭐ 자체개발</option>
              <option value="퍼옴">🔗 퍼옴</option>
            </select>
          </div>
        </div>

        <label for="fDesc">사용안내 · 놀이방법 (선택)</label>
        <textarea id="fDesc" rows="3" placeholder="예: 태블릿을 가로로 두고 시작해요. 소리를 켜 주세요."></textarea>

        <label for="fThumb">썸네일 이미지 (선택)</label>
        <input type="file" id="fThumb" accept="image/*">
        <img class="thumb-preview" id="thumbPreview" alt="썸네일 미리보기">

        <div class="msg" id="formMsg"></div>
        <div class="btn-row">
          <button class="btn btn-ghost" id="resetBtn">비우기</button>
          <button class="btn btn-primary" id="saveBtn" style="flex:1">등록하기</button>
        </div>
      </div>

      <!-- ════ 오른쪽: 보드 + 반별 선택 ════ -->
      <div class="panel">
        <div class="board-head">
          <h2 style="margin:0">등록된 링크 <span id="count" style="opacity:.5;font-size:14px"></span></h2>
          <select id="classSelect"><option value="">반 선택…</option></select>
          <button type="button" class="btn btn-ghost mini" id="addClassBtn">+ 반 추가</button>
          <button type="button" class="btn mini save-sel" id="saveSelBtn" disabled>선택 저장</button>
        </div>
        <p class="sticky-note" id="selHint">반을 선택하면 체크박스가 나타나요. 체크한 놀이만 그 반 태블릿에 보여요.</p>

        <div class="filters">
          <div class="f-row"><span class="f-label">대분류</span><span class="chip-row" id="filterCat"></span></div>
          <div class="f-row"><span class="f-label">놀이 주제</span><span class="chip-row" id="filterTheme"></span></div>
          <div class="f-row"><span class="f-label">활동 유형</span><span class="chip-row" id="filterType"></span></div>
          <div class="f-row"><span class="f-label">연령</span><span class="chip-row" id="filterAge"></span></div>
          <div class="f-row"><span class="f-label">출처</span><span class="chip-row" id="filterSource"></span></div>
        </div>

        <div id="list"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════ 설정 (배포 시 여기만 수정) ══════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbzasSuCH2Z3lZU2J_j2ryx26yDuIRAhxPivsQJ7xqNM6TowFuvJXn_nemSdIFIuYjzumg/exec';
/* ═══════════════════════════════════════════════════════ */

const AGES = ['만2', '만3', '만4', '만5'];
const PALETTE = ['#6ED3BF', '#FFC93C', '#FF7B6B', '#8FB8F6', '#C9A0F0'];
const TEACHER_KEY = 'noriTeacher';
const ADMIN_CLASS_KEY = 'noriAdminClass';

let pw = sessionStorage.getItem('noriPw') || '';
let links = [];
let config = { themes: [], types: [], teachers: [], classes: [] };
let selections = {};
let editingId = null;
let thumbData = null;
let curClass = '';
let curCat = '놀이'; // 등록 폼의 현재 탭 (놀이/업무)
let checked = new Set(); // 현재 반의 체크 상태
let dirty = false;
let filters = { cat: '전체', theme: '전체', type: '전체', age: '전체', source: '전체' };

/* ───── API ───── */
async function api(body) {
  const res = await fetch(API_URL, {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ ...body, pw })
  });
  return res.json();
}

/* ───── 로그인 ───── */
async function login() {
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('loginMsg');
  pw = document.getElementById('pw').value;
  btn.disabled = true; btn.textContent = '확인 중…';
  try {
    const data = await api({ action: 'auth' });
    if (data.ok) {
      sessionStorage.setItem('noriPw', pw);
      showAdmin();
    } else {
      msg.className = 'msg bad'; msg.textContent = '비밀번호가 맞지 않습니다.';
    }
  } catch (e) {
    msg.className = 'msg bad'; msg.textContent = '연결 실패 — API_URL 설정을 확인하세요.';
  }
  btn.disabled = false; btn.textContent = '로그인';
}
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function showAdmin() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('adminView').style.display = 'block';
  buildAgeChips();
  await loadAll();
}

/* ───── 데이터 로드 ───── */
async function loadAll() {
  const res = await fetch(API_URL + '?action=list');
  const data = await res.json();
  links = data.links || [];
  config = data.config || config;
  selections = data.selections || {};
  buildFormChips();
  buildTeacherSelect();
  buildClassSelect();
  buildFilters();
  renderList();
}

/* ───── 왼쪽 폼: 칩 & 드롭다운 ───── */
function buildAgeChips() {
  const box = document.getElementById('fAges');
  box.innerHTML = '';
  AGES.forEach(a => box.appendChild(makeChip(a + '세', false, a)));
}

function makeChip(label, on, value) {
  const c = document.createElement('button');
  c.type = 'button'; c.className = 'chip' + (on ? ' on' : '');
  c.textContent = label; c.dataset.value = value;
  c.addEventListener('click', () => c.classList.toggle('on'));
  return c;
}

function buildFormChips(selThemes, selTypes) {
  const tBox = document.getElementById('fThemes');
  const yBox = document.getElementById('fTypes');
  const onT = selThemes || [...tBox.querySelectorAll('.chip.on')].map(c => c.dataset.value);
  const onY = selTypes || [...yBox.querySelectorAll('.chip.on')].map(c => c.dataset.value);
  tBox.innerHTML = ''; yBox.innerHTML = '';
  config.themes.forEach(t => tBox.appendChild(makeChip(t, onT.includes(t), t)));
  config.types.forEach(t => yBox.appendChild(makeChip(t, onY.includes(t), t)));
}

function buildTeacherSelect(selected) {
  const sel = document.getElementById('fTeacher');
  const keep = selected || sel.value || localStorage.getItem(TEACHER_KEY) || '';
  sel.innerHTML = '<option value="">이름 선택</option>';
  config.teachers.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
  if (keep && config.teachers.includes(keep)) sel.value = keep;
}
document.getElementById('fTeacher').addEventListener('change', e => {
  if (e.target.value) localStorage.setItem(TEACHER_KEY, e.target.value);
});

/* 새 주제/유형/선생님 추가 (공용 핸들러) */
document.querySelectorAll('[data-add]').forEach(btn => {
  btn.addEventListener('click', async () => {
    const input = document.getElementById(btn.dataset.input);
    const name = input.value.trim();
    if (!name) return;
    const kind = btn.dataset.add;
    const data = await api({ action: 'addConfig', kind, name });
    if (!data.ok) return alert('추가 실패: ' + data.error);
    config = data.config;
    if (kind === 'themes') {
      const on = [...document.querySelectorAll('#fThemes .chip.on')].map(c => c.dataset.value);
      buildFormChips([...on, name], null);
    } else if (kind === 'types') {
      const on = [...document.querySelectorAll('#fTypes .chip.on')].map(c => c.dataset.value);
      buildFormChips(null, [...on, name]);
    } else if (kind === 'teachers') {
      buildTeacherSelect(name);
      localStorage.setItem(TEACHER_KEY, name);
    }
    buildFilters();
    input.value = '';
  });
});

/* ───── 썸네일 ───── */
document.getElementById('fThumb').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) { thumbData = null; return; }
  const img = new Image();
  const reader = new FileReader();
  reader.onload = ev => { img.src = ev.target.result; };
  img.onload = () => {
    const scale = Math.min(1, 400 / img.width);
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
    thumbData = { data: dataUrl.split(',')[1], mimeType: 'image/jpeg', filename: 'thumb_' + Date.now() + '.jpg' };
    const prev = document.getElementById('thumbPreview');
    prev.src = dataUrl; prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

/* ───── 폼 초기화 / 수정 / 저장 ───── */
/* ───── 등록 탭 (놀이/업무) ───── */
function setCat(cat) {
  curCat = cat;
  document.querySelectorAll('#catSeg .seg-btn').forEach(b => b.classList.toggle('on', b.dataset.cat === cat));
  document.getElementById('playOnly').style.display = cat === '놀이' ? 'block' : 'none';
  document.getElementById('catNote').textContent = cat === '놀이'
    ? '놀이는 유아 태블릿에 노출돼요. 반별 선택에서 체크하면 그 반에 보여요.'
    : '업무 링크는 유아 화면에 나가지 않고, 이 관리 페이지에서 교사끼리만 봐요.';
  if (!editingId) {
    document.getElementById('formTitle').textContent = cat === '놀이' ? '새 놀이 등록' : '새 업무 링크 등록';
  }
}
document.querySelectorAll('#catSeg .seg-btn').forEach(b =>
  b.addEventListener('click', () => {
    setCat(b.dataset.cat);
    // 탭에 맞춰 오른쪽 리스트도 같은 대분류만 보이게
    filters.cat = b.dataset.cat;
    buildFilterRow('filterCat', 'cat', ['놀이', '업무']);
    renderList();
  })
);

function resetForm() {
  editingId = null; thumbData = null;
  setCat('놀이');
  document.getElementById('formTitle').textContent = '새 놀이 등록';
  document.getElementById('saveBtn').textContent = '등록하기';
  document.getElementById('fSource').value = '자체개발';
  ['fTitle', 'fUrl', 'fDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fThumb').value = '';
  document.getElementById('thumbPreview').style.display = 'none';
  document.querySelectorAll('#fAges .chip').forEach(c => c.classList.remove('on'));
  buildFormChips([], []);
  buildTeacherSelect(localStorage.getItem(TEACHER_KEY) || '');
  document.getElementById('formMsg').className = 'msg';
}
document.getElementById('resetBtn').addEventListener('click', resetForm);

function startEdit(id) {
  const l = links.find(x => x.id === id);
  if (!l) return;
  editingId = id; thumbData = null;
  setCat(l.category || '놀이');
  document.getElementById('formTitle').textContent = l.category === '업무' ? '업무 링크 수정' : '놀이 수정';
  document.getElementById('saveBtn').textContent = '수정 저장';
  document.getElementById('fSource').value = l.source || '자체개발';
  document.getElementById('fTitle').value = l.title;
  document.getElementById('fUrl').value = l.url;
  document.getElementById('fDesc').value = l.desc || '';
  document.querySelectorAll('#fAges .chip').forEach(c => c.classList.toggle('on', l.ages.includes(c.dataset.value)));
  buildFormChips(l.themes, l.types);
  buildTeacherSelect(l.teacher);
  if (l.thumb) {
    const prev = document.getElementById('thumbPreview');
    prev.src = l.thumb; prev.style.display = 'block';
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function save() {
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('saveBtn');
  const category = curCat;
  const title = document.getElementById('fTitle').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  const ages = category === '놀이'
    ? [...document.querySelectorAll('#fAges .chip.on')].map(c => c.dataset.value)
    : [];
  if (!title || !url) { msg.className = 'msg bad'; msg.textContent = '이름과 링크는 꼭 입력해 주세요.'; return; }
  if (category === '놀이' && ages.length === 0) { msg.className = 'msg bad'; msg.textContent = '놀이는 연령을 하나 이상 선택해 주세요.'; return; }

  btn.disabled = true; btn.textContent = '저장 중…';
  try {
    const prev = editingId ? links.find(x => x.id === editingId) : null;
    let thumbUrl = prev ? (prev.thumb || '') : '';
    if (thumbData) {
      const up = await api({ action: 'upload', ...thumbData });
      if (!up.ok) throw new Error(up.error);
      thumbUrl = up.url;
    }
    const link = {
      id: editingId,
      category, title, url, ages,
      themes: category === '놀이' ? [...document.querySelectorAll('#fThemes .chip.on')].map(c => c.dataset.value) : [],
      types: category === '놀이' ? [...document.querySelectorAll('#fTypes .chip.on')].map(c => c.dataset.value) : [],
      source: document.getElementById('fSource').value,
      desc: document.getElementById('fDesc').value.trim(),
      thumb: thumbUrl,
      teacher: document.getElementById('fTeacher').value,
      openMode: prev ? (prev.openMode || 'newtab') : 'newtab' // 화면에서 선택 제거 — 필요 시 시트에서 변경
    };
    const data = await api({ action: editingId ? 'update' : 'add', link });
    if (!data.ok) throw new Error(data.error);
    msg.className = 'msg ok';
    msg.textContent = editingId ? '수정했어요.' : (category === '놀이' ? '등록했어요! 반별 선택에서 체크하면 태블릿에 보여요.' : '등록했어요!');
    resetForm();
    await loadAll();
  } catch (e) {
    msg.className = 'msg bad'; msg.textContent = '저장에 실패했어요: ' + e.message;
  }
  btn.disabled = false; btn.textContent = editingId ? '수정 저장' : '등록하기';
}
document.getElementById('saveBtn').addEventListener('click', save);

async function delLink(id) {
  const l = links.find(x => x.id === id);
  if (!confirm(`"${l ? l.title : ''}" 링크를 삭제할까요?\n반별 선택에서도 함께 빠집니다.`)) return;
  const data = await api({ action: 'delete', id });
  if (data.ok) await loadAll();
  else alert('삭제 실패: ' + data.error);
}

/* ───── 오른쪽: 반 선택 ───── */
function buildClassSelect() {
  const sel = document.getElementById('classSelect');
  const keep = curClass || localStorage.getItem(ADMIN_CLASS_KEY) || '';
  sel.innerHTML = '<option value="">반 선택…</option>';
  config.classes.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
  if (keep && config.classes.includes(keep)) {
    sel.value = keep;
    setClass(keep, false);
  }
}

document.getElementById('classSelect').addEventListener('change', e => {
  if (dirty && !confirm('저장하지 않은 선택이 있어요. 반을 바꾸면 사라집니다. 계속할까요?')) {
    e.target.value = curClass;
    return;
  }
  setClass(e.target.value, true);
});

function setClass(name, rerender) {
  curClass = name;
  if (name) localStorage.setItem(ADMIN_CLASS_KEY, name);
  checked = new Set(selections[name] || []);
  dirty = false;
  updateSaveBtn();
  if (rerender !== false) renderList();
}

document.getElementById('addClassBtn').addEventListener('click', async () => {
  const name = prompt('추가할 반 이름을 입력하세요 (예: 햇님반)');
  if (!name || !name.trim()) return;
  const data = await api({ action: 'addConfig', kind: 'classes', name: name.trim() });
  if (!data.ok) return alert('반 추가 실패: ' + data.error);
  config = data.config;
  buildClassSelect();
  document.getElementById('classSelect').value = name.trim();
  setClass(name.trim(), true);
});

function updateSaveBtn() {
  const btn = document.getElementById('saveSelBtn');
  btn.disabled = !curClass;
  btn.classList.toggle('dirty', dirty);
  btn.textContent = curClass
    ? (dirty ? `선택 저장 (${checked.size}개)` : `저장됨 (${checked.size}개)`)
    : '선택 저장';
}

document.getElementById('saveSelBtn').addEventListener('click', async () => {
  if (!curClass) return;
  const btn = document.getElementById('saveSelBtn');
  btn.disabled = true; btn.textContent = '저장 중…';
  const data = await api({ action: 'setSelection', className: curClass, ids: [...checked] });
  if (data.ok) {
    selections = data.selections;
    dirty = false;
  } else alert('저장 실패: ' + data.error);
  btn.disabled = false;
  updateSaveBtn();
});

/* ───── 오른쪽: 필터 ───── */
function buildFilters() {
  buildFilterRow('filterCat', 'cat', ['놀이', '업무']);
  buildFilterRow('filterTheme', 'theme', config.themes);
  buildFilterRow('filterType', 'type', config.types);
  buildFilterRow('filterAge', 'age', AGES.map(a => a + '세'));
  buildFilterRow('filterSource', 'source', ['자체개발', '퍼옴']);
}

function buildFilterRow(boxId, key, options) {
  const box = document.getElementById(boxId);
  box.innerHTML = '';
  ['전체', ...options].forEach(opt => {
    const c = document.createElement('button');
    c.type = 'button';
    c.className = 'chip' + (filters[key] === opt ? ' on' : '');
    c.textContent = opt;
    c.addEventListener('click', () => {
      filters[key] = opt;
      buildFilterRow(boxId, key, options);
      renderList();
    });
    box.appendChild(c);
  });
}

/* ───── 오른쪽: 리스트 ───── */
function renderList() {
  const box = document.getElementById('list');
  const shown = links.filter(l => {
    if (filters.cat !== '전체' && l.category !== filters.cat) return false;
    if (filters.theme !== '전체' && !l.themes.includes(filters.theme)) return false;
    if (filters.type !== '전체' && !l.types.includes(filters.type)) return false;
    if (filters.age !== '전체' && !l.ages.includes(filters.age.replace('세', ''))) return false;
    if (filters.source !== '전체' && l.source !== filters.source) return false;
    return true;
  });
  document.getElementById('count').textContent = `${shown.length} / ${links.length}개`;
  box.innerHTML = shown.length ? '' : '<p class="empty">조건에 맞는 링크가 없어요.</p>';

  shown.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'item';
    const canCheck = curClass && l.category === '놀이';
    const checkbox = canCheck
      ? `<input type="checkbox" data-check="${l.id}" ${checked.has(l.id) ? 'checked' : ''} aria-label="${esc(l.title)} 노출 선택">`
      : '<span style="width:22px;flex-shrink:0"></span>';
    const thumb = l.thumb
      ? `<img src="${esc(l.thumb)}" alt="">`
      : `<div class="ph" style="background:${PALETTE[i % PALETTE.length]}">${esc(l.title.charAt(0))}</div>`;
    const meta = [
      l.ages.map(a => a + '세').join('·'),
      l.themes.join(', '),
      l.types.join(', '),
      (l.source === '자체개발' ? '⭐' : '🔗') + ' ' + esc(l.teacher || '-')
    ].filter(Boolean).join('　|　');
    const arrow = l.desc ? ' <span class="d-arrow">▼</span>' : '';
    const descHtml = l.desc ? `<div class="item-desc">${esc(l.desc)}</div>` : '';
    div.innerHTML = `${checkbox}${thumb}
      <div class="item-info" ${l.desc ? 'style="cursor:pointer" title="사용안내 보기"' : ''}>
        <div class="item-title"><span class="cat ${l.category === '놀이' ? 'play' : 'work'}">${l.category}</span>${esc(l.title)}${arrow}</div>
        <div class="item-meta">${meta}</div>
      </div>
      <button class="btn btn-ghost mini" data-edit="${l.id}">수정</button>
      <button class="btn btn-danger mini" data-del="${l.id}">삭제</button>
      ${descHtml}`;
    if (l.desc) {
      div.querySelector('.item-info').addEventListener('click', () => div.classList.toggle('open'));
    }
    box.appendChild(div);
  });

  box.querySelectorAll('[data-check]').forEach(cb => cb.addEventListener('change', () => {
    if (cb.checked) checked.add(cb.dataset.check);
    else checked.delete(cb.dataset.check);
    dirty = true;
    updateSaveBtn();
  }));
  box.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => startEdit(b.dataset.edit)));
  box.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => delLink(b.dataset.del)));
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* 자동 로그인 시도 */
if (pw) {
  document.getElementById('pw').value = pw;
  login();
}
</script>
</body>
</html>
