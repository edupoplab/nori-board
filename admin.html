<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새싹 놀이터 · 교사 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #EAF4FE; --navy: #1E3A5F; --sun: #FFC93C;
    --coral: #FF7B6B; --mint: #6ED3BF; --white: #fff;
    --line: #DCE8F5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Gowun Dodum', sans-serif; background: #F7FAFE; color: var(--navy); }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-family: 'Jua', sans-serif; font-weight: 400; font-size: 26px; }
  .sub { font-size: 14px; opacity: .6; margin: 4px 0 26px; }
  h2 { font-family: 'Jua', sans-serif; font-weight: 400; font-size: 19px; margin-bottom: 14px; }

  .panel { background: var(--white); border: 1px solid var(--line); border-radius: 18px; padding: 24px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; opacity: .7; margin: 14px 0 6px; }
  input[type=text], input[type=url], input[type=password], select {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--navy);
    padding: 11px 14px; border: 1.5px solid var(--line); border-radius: 12px; background: var(--white);
  }
  input:focus, select:focus { outline: none; border-color: var(--sun); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 560px) { .row2 { grid-template-columns: 1fr; } }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-family: 'Jua', sans-serif; font-size: 15px; padding: 8px 16px; border-radius: 999px;
    border: 1.5px solid var(--line); background: var(--white); color: var(--navy); cursor: pointer;
  }
  .chip.on { background: var(--navy); border-color: var(--navy); color: var(--white); }

  .btn {
    font-family: 'Jua', sans-serif; font-size: 16px; border: none; border-radius: 12px;
    padding: 12px 22px; cursor: pointer;
  }
  .btn-primary { background: var(--sun); color: var(--navy); }
  .btn-ghost { background: var(--sky); color: var(--navy); }
  .btn-danger { background: #FDEDEA; color: #C94F3D; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn-row { display: flex; gap: 10px; margin-top: 22px; }

  .msg { font-size: 14px; margin-top: 12px; display: none; }
  .msg.ok { color: #1F8A70; display: block; }
  .msg.bad { color: var(--coral); display: block; }

  .thumb-preview {
    width: 120px; aspect-ratio: 4/3; border-radius: 10px; object-fit: cover;
    border: 1.5px solid var(--line); display: none; margin-top: 8px;
  }

  /* 목록 */
  .item {
    display: flex; gap: 14px; align-items: center;
    padding: 14px 0; border-bottom: 1px solid var(--line);
  }
  .item:last-child { border-bottom: none; }
  .item img, .item .ph {
    width: 78px; aspect-ratio: 4/3; border-radius: 10px; object-fit: cover; flex-shrink: 0;
    background: var(--sky);
  }
  .item .ph { display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 26px; color: var(--white); }
  .item-info { flex: 1; min-width: 0; }
  .item-title { font-family: 'Jua', sans-serif; font-size: 16px; }
  .item-meta { font-size: 12.5px; opacity: .6; margin-top: 3px; }
  .mini { font-size: 13px; padding: 7px 13px; border-radius: 10px; }

  #loginView .panel { max-width: 380px; margin: 60px auto; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 로그인 -->
  <div id="loginView">
    <div class="panel">
      <h2>교사 관리 페이지</h2>
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" inputmode="numeric" autocomplete="off">
      <div class="msg" id="loginMsg"></div>
      <div class="btn-row"><button class="btn btn-primary" id="loginBtn" style="flex:1">로그인</button></div>
    </div>
  </div>

  <!-- 관리 화면 -->
  <div id="adminView" style="display:none">
    <h1>새싹 놀이터 · 교사 관리</h1>
    <p class="sub">놀이 링크를 등록하면 유아용 화면에 바로 나타나요.</p>

    <div class="panel">
      <h2 id="formTitle">새 놀이 등록</h2>

      <label for="fTitle">놀이 이름</label>
      <input type="text" id="fTitle" placeholder="예: 한글 단어 미로 게임">

      <label for="fUrl">놀이 링크 (URL)</label>
      <input type="url" id="fUrl" placeholder="https://…">

      <label>연령 (해당하는 것 모두 선택)</label>
      <div class="chip-row" id="fAges"></div>

      <label for="fTags">놀이 주제 (쉼표로 구분)</label>
      <input type="text" id="fTags" placeholder="예: 한글, 게임">

      <div class="row2">
        <div>
          <label for="fTeacher">등록 선생님</label>
          <input type="text" id="fTeacher" placeholder="이름">
        </div>
        <div>
          <label for="fMode">여는 방식</label>
          <select id="fMode">
            <option value="iframe">앱 안에서 열기 (기본)</option>
            <option value="newtab">새 창으로 열기</option>
          </select>
        </div>
      </div>

      <label for="fThumb">썸네일 이미지 (선택)</label>
      <input type="file" id="fThumb" accept="image/*">
      <img class="thumb-preview" id="thumbPreview" alt="썸네일 미리보기">

      <div class="msg" id="formMsg"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="resetBtn">비우기</button>
        <button class="btn btn-primary" id="saveBtn" style="flex:1">등록하기</button>
      </div>
    </div>

    <div class="panel">
      <h2>등록된 놀이 <span id="count" style="opacity:.5;font-size:15px"></span></h2>
      <div id="list"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════ 설정 (배포 시 여기만 수정) ══════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbzasSuCH2Z3lZU2J_j2ryx26yDuIRAhxPivsQJ7xqNM6TowFuvJXn_nemSdIFIuYjzumg/exec';
/* ═══════════════════════════════════════════════════════ */

const AGES = ['3', '4', '5'];
const PALETTE = ['#6ED3BF', '#FFC93C', '#FF7B6B', '#8FB8F6', '#C9A0F0'];
let pw = sessionStorage.getItem('noriPw') || '';
let links = [];
let editingId = null;
let thumbData = null; // {data, mimeType, filename}

/* ───── API 헬퍼 ───── */
async function api(body) {
  const res = await fetch(API_URL, {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ ...body, pw })
  });
  return res.json();
}

/* ───── 로그인 ───── */
async function login() {
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('loginMsg');
  pw = document.getElementById('pw').value;
  btn.disabled = true; btn.textContent = '확인 중…';
  try {
    const data = await api({ action: 'auth' });
    if (data.ok) {
      sessionStorage.setItem('noriPw', pw);
      showAdmin();
    } else {
      msg.className = 'msg bad'; msg.textContent = '비밀번호가 맞지 않습니다.';
    }
  } catch (e) {
    msg.className = 'msg bad'; msg.textContent = '연결 실패 — API_URL 설정을 확인하세요.';
  }
  btn.disabled = false; btn.textContent = '로그인';
}
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function showAdmin() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('adminView').style.display = 'block';
  buildAgeChips();
  await loadList();
}

/* ───── 목록 ───── */
async function loadList() {
  const res = await fetch(API_URL + '?action=list');
  const data = await res.json();
  links = data.links || [];
  renderList();
}

function renderList() {
  const box = document.getElementById('list');
  document.getElementById('count').textContent = links.length + '개';
  box.innerHTML = links.length ? '' : '<p style="opacity:.5;font-size:14px">아직 등록된 놀이가 없어요.</p>';
  links.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'item';
    const thumb = l.thumb
      ? `<img src="${esc(l.thumb)}" alt="">`
      : `<div class="ph" style="background:${PALETTE[i % PALETTE.length]}">${esc(l.title.charAt(0))}</div>`;
    div.innerHTML = `${thumb}
      <div class="item-info">
        <div class="item-title">${esc(l.title)}</div>
        <div class="item-meta">${l.ages.map(a => a + '세').join(' · ')}　|　${esc(l.tags.join(', ') || '주제 없음')}　|　${esc(l.teacher || '-')}</div>
      </div>
      <button class="btn btn-ghost mini" data-edit="${l.id}">수정</button>
      <button class="btn btn-danger mini" data-del="${l.id}">삭제</button>`;
    box.appendChild(div);
  });
  box.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => startEdit(b.dataset.edit)));
  box.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => delLink(b.dataset.del)));
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ───── 등록 폼 ───── */
function buildAgeChips() {
  const box = document.getElementById('fAges');
  box.innerHTML = '';
  AGES.forEach(a => {
    const c = document.createElement('button');
    c.type = 'button'; c.className = 'chip'; c.textContent = a + '세'; c.dataset.value = a;
    c.addEventListener('click', () => c.classList.toggle('on'));
    box.appendChild(c);
  });
}

document.getElementById('fThumb').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) { thumbData = null; return; }
  const img = new Image();
  const reader = new FileReader();
  reader.onload = ev => { img.src = ev.target.result; };
  img.onload = () => {
    // 400px 폭으로 리사이즈 → 용량 절약
    const scale = Math.min(1, 400 / img.width);
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
    thumbData = { data: dataUrl.split(',')[1], mimeType: 'image/jpeg', filename: 'thumb_' + Date.now() + '.jpg' };
    const prev = document.getElementById('thumbPreview');
    prev.src = dataUrl; prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

function resetForm() {
  editingId = null; thumbData = null;
  document.getElementById('formTitle').textContent = '새 놀이 등록';
  document.getElementById('saveBtn').textContent = '등록하기';
  ['fTitle', 'fUrl', 'fTags', 'fTeacher'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fMode').value = 'iframe';
  document.getElementById('fThumb').value = '';
  document.getElementById('thumbPreview').style.display = 'none';
  document.querySelectorAll('#fAges .chip').forEach(c => c.classList.remove('on'));
  const msg = document.getElementById('formMsg'); msg.className = 'msg';
}
document.getElementById('resetBtn').addEventListener('click', resetForm);

function startEdit(id) {
  const l = links.find(x => x.id === id);
  if (!l) return;
  editingId = id; thumbData = null;
  document.getElementById('formTitle').textContent = '놀이 수정';
  document.getElementById('saveBtn').textContent = '수정 저장';
  document.getElementById('fTitle').value = l.title;
  document.getElementById('fUrl').value = l.url;
  document.getElementById('fTags').value = l.tags.join(', ');
  document.getElementById('fTeacher').value = l.teacher;
  document.getElementById('fMode').value = l.openMode || 'iframe';
  document.querySelectorAll('#fAges .chip').forEach(c => c.classList.toggle('on', l.ages.includes(c.dataset.value)));
  if (l.thumb) {
    const prev = document.getElementById('thumbPreview');
    prev.src = l.thumb; prev.style.display = 'block';
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function save() {
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('saveBtn');
  const title = document.getElementById('fTitle').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  const ages = [...document.querySelectorAll('#fAges .chip.on')].map(c => c.dataset.value);
  if (!title || !url) { msg.className = 'msg bad'; msg.textContent = '놀이 이름과 링크는 꼭 입력해 주세요.'; return; }
  if (ages.length === 0) { msg.className = 'msg bad'; msg.textContent = '연령을 하나 이상 선택해 주세요.'; return; }

  btn.disabled = true; btn.textContent = '저장 중…';
  try {
    // 썸네일 새로 골랐으면 먼저 업로드
    let thumbUrl = editingId ? (links.find(x => x.id === editingId)?.thumb || '') : '';
    if (thumbData) {
      const up = await api({ action: 'upload', ...thumbData });
      if (!up.ok) throw new Error(up.error);
      thumbUrl = up.url;
    }
    const link = {
      id: editingId,
      title, url, ages,
      tags: document.getElementById('fTags').value.split(',').map(s => s.trim()).filter(Boolean),
      thumb: thumbUrl,
      teacher: document.getElementById('fTeacher').value.trim(),
      openMode: document.getElementById('fMode').value
    };
    const data = await api({ action: editingId ? 'update' : 'add', link });
    if (!data.ok) throw new Error(data.error);
    msg.className = 'msg ok'; msg.textContent = editingId ? '수정했어요.' : '등록했어요! 유아 화면에 바로 나타나요.';
    resetForm();
    await loadList();
  } catch (e) {
    msg.className = 'msg bad'; msg.textContent = '저장에 실패했어요: ' + e.message;
  }
  btn.disabled = false; btn.textContent = editingId ? '수정 저장' : '등록하기';
}
document.getElementById('saveBtn').addEventListener('click', save);

async function delLink(id) {
  const l = links.find(x => x.id === id);
  if (!confirm(`"${l ? l.title : ''}" 놀이를 삭제할까요?`)) return;
  const data = await api({ action: 'delete', id });
  if (data.ok) await loadList();
  else alert('삭제 실패: ' + data.error);
}

/* 자동 로그인 시도 */
if (pw) {
  document.getElementById('pw').value = pw;
  login();
}
</script>
</body>
</html>
